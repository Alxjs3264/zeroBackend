security:
  - bearerAuth: []         # use the same name as above

###############################################################
############ COMPONENTS
###############################################################
components:
  securitySchemes:
    bearerAuth:            # arbitrary name for the security scheme
      type: http
      scheme: bearer
      bearerFormat: JWT    # optional, arbitrary value for documentation purposes
  schemas:
    documentoResumido:
      type: object
      properties:
        id:
          type: string
          example: 44654565-c8ac-4f28-a29b-4ed13b2ccee1
        codigoFlujo:
          type: string
          example: F-MJTI-LEGAL-128-2021
        cite:
          type: string
          example: MJTI-LEGAL-129-2021
        correlativo:
          type: string
          example: LEGAL-252-2021
        clasificacion:
          type: string
          example: ABIERTO
        firmado:
          type: boolean
          example: false
        fechaEmitido:
          type: string
          example: 14-11-2021 14:10:42
        fechaAceptado:
          type: string
          example: 14-11-2021 16:10:42
        fechaCerrado:
          type: string
          example: null
          description: Formato DD-MM-AAAA HH:mm:ss por ejemplo 14-11-2021 16:10:42
        nombrePlantilla:
          type: string
          example: Solicitud de viajes 1
        remitidoPor:
          type: string
          example: 6647643
        asunto:
          type: string
          example: Solicitud de viajes - Carlos Perez
        destinatarioEspecifico:
          type: object
          properties:
            numeroDocumento:
              type: string
              example: 9048672
            nombres:
              type: string
              example: Juana Esther
            primerApellido:
              type: string
              example: Tellez
            segundoApellido:
              type: string
              example: Corrales
            area:
              type: string
              example: ASUNTOS JURÍDICOS
        destinatarioArea:
          type: string
          example: ""
        citeDocumentoPadre:
          type: string
          example: MJTI-LEGAL-128-2021
        estado:
          type: string
          example: NUEVO
    usuarioReducido:
      type: object
      properties:
        numeroDocumento:
          type: string
          description: Esta campo es equivalente al C.I. 
          example: 8851812
        entidad:
          type: object
          properties:
            nombre:
              type: string
              example: Ministerio de justicia y transparencia institucional
            sigla:
              type: string
              example: MJTI
        tipoDocumento:
          type: string
          example: CI
        nombres:
          type: string
          example: Juan Marcelo
        primerApellido:
          type: string
          example: Laguna
        segundoApellido:
          type: string
          example: Vernabe
        cargo:
          type: string
          example: asistente de jefe de unidad
        area:
          type: object
          properties:
            nombre:
              type: string
              example: LEGAL
            sigla:
              type: string
              example: LGL
        estado:
          type: string
          enum: [ACTIVO, INACTIVO]
          example: ACTIVO
