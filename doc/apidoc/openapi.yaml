  /gestion/documentoInternoSearch:
    get:
      tags:
        - "documentoInternoSearch"
      summary: "Realiza el listado reducido de documentos internos"
      description: Realiza el listado de documentos internos dados los criterios de búsqueda dados en los parámetros.
      parameters:
      - name: cite
        in: query
        description: Cite o parte del cite siendo buscado
        required: false
        schema:
          type: string
          example: MJTI-LEGAL-
      - name: asunto
        in: query
        description: Asunto o parte del asunto del documento
        required: false
        schema:
          type: string
          example: Solicitud de viajes
      - name: estado
        in: query
        description: estado del documento
        required: false
        schema:
          type: string
          example: NUEVO
      - name: remitidoPor
        in: query
        description: Documento de identidad del remitente
        required: false
        schema:
          type: string
          example: 6647643
      - name: ciDestinatarioEspecifico
        in: query
        description: Documento de identidad del destinatario específico
        required: false
        schema:
          type: string
          example: 9048672
      - name: areaDestino
        in: query
        description: Nombre del área a la que los documentos han sido marcados como destinatarios
        required: false
        schema:
          type: string
          example: Legal
      - name: citeDocumentoPadre
        in: query
        description: Código del documento padre
        required: false
        schema:
          type: string
          example: MJTI-LEGAL-8-2021
      - name: categoria
        in: query
        description: Categoría donde se guarda el documento una vez archivado.
        required: false
        schema:
          type: string
          example: informes
      responses:
        200:
          description: Se han listado los documentos correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/documentoResumido"
        "405":
          description: Error al buscar documentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error parámetros
                  errores:
                    type: array
                    items:
                      type: string
                      example: "Debe especificar parámetros de búsqueda" 
  /gestion/bandejaDocumentos:
    get:
      tags:
        - "bandejaDocumentos"
      summary: "Obtiene la bandeja de documentos correspondiente a cada usuario"
      description: Realiza el listado de documentos pertenecientes a cada usuario.
      operationId: bandejaDocumentos
      parameters:
      - name: page
        in: query
        description: Número de la página
        required: false
        schema:
          type: number
          example: 1
      - name: pageSize
        in: query
        description: Número máximo de documentos por página.
        required: false
        schema:
          type: number
          example: 10
      - name: tipo
        in: query
        description: Tipo de bandeja siendo consultada. Si no se proporciona este parametro se devuelven los arrays **entrada, salida, pendientes, borradores, concluidos, via**.
        required: false
        schema:
          type: string
          enum:
            - entdada
            - salida
            - pendientes
            - concluidos
            - borradores
            - via
      responses:
        200:
          description: Se han listado los documentos correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entrada:
                    description: Bandeja de documentos que deben ser procesados.
                    type: array
                    items:
                      $ref: "#/components/schemas/documentoResumido"
                  salida:
                    description: Bandeja de documentos que deben ser despachados o archivados.
                    type: array
                    items:
                      $ref: "#/components/schemas/documentoResumido"
                  pendientes:
                    description: Bandeja de documentos que han sido aceptados y no fueron procesados aún. Esta bandeja solo la tienen los roles; Ministro, Viceministro, Directores, Jefes de unidad.
                    type: array
                    items:
                      $ref: "#/components/schemas/documentoResumido"
                  borradores:
                    description: Bandeja de documentos que han el mismo usuario ha creado y tiene como borradores
                    type: array
                    items:
                      $ref: "#/components/schemas/documentoResumido"
                  concluidos:
                    description: Bandeja de documentos dirigidos o creados por el usuario y cuyo flujo documental ha concluído.
                    type: array
                    items:
                      $ref: "#/components/schemas/documentoResumido"
                  via:
                    description: Bandeja de documentos donde este usuario ha sido incluído como revisor. El usuario tiene la posiblidad de revisar los documentos o agregar observaciones, pero no modificar el flujo.
                    type: array
                    items:
                      $ref: "#/components/schemas/documentoResumido"

  /gestion/despacharDocumentoInterno:
    post:
      tags:
        - "despacharDocumentoInterno"
      summary: "Despacha un documento interno."
      description: El destinatario despacha este documento es decir **confirma que se ha terminado de crear** y lo envía hacia un destinatario. Una vez que se despacha, se genera un **CITE** para este documento y se realiza el proceso de aprobación con ciudadanía digital retornando un `linkRedireccion`.
      operationId: despacharDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - correlativo
              properties:
                correlativo:
                  type: string
                  description: Correlativo identificador del documento
                  example: MJTI-RRHH-12-2021
      responses:
        200:
          description: Documento despachado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-RRHH-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-RRHH-3-2021
                  linkRedireccion:
                    type: string
                    example: https://demo.gtic.gob.bo/ciudadania-firma/29941-92914919291912
                    description: Este campo es `null` cuando no se ha hecho el proceso de aprobación con ciudadanía digital.
        "400":
          description: Error al despachar documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró documento con el CITE especificado."
  /gestion/aceptarDocumentoInterno:
    post:
      tags:
        - "aceptarDocumentoInterno"
      summary: "Acepta la revisión documento interno."
      description: El destinatario acepta revisar este documento.
      operationId: aceptarDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-89247643-3-2021
      responses:
        200:
          description: Documento aceptado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-89247643-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-89247643-3-2021
        "400":
          description: Error al aceptar documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró documento con el CITE especificado."
  /gestion/observacionDocumentoInterno:
    post:
      tags:
        - "observacionDocumentoInterno"
      summary: ""
      description: El destinatario agrega observaciones al documento solicitando se subsanen.
      operationId: observarDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              - observacion
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-89247643-3-2021
                observacion:
                  type: string
                  example: Agregar al área ADMINISTRATIVA como destintario de este documento.
      responses:
        200:
          description: Observación registrada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-89247643-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-89247643-3-2021
        "400":
          description: Error al aceptar documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró documento con el CITE especificado."
    put:
      tags:
        - "observacionDocumentoInterno"
      summary: "Subsanación de observación de documento interno"
      description: El remitente ha revisado las observaciones y aplica acciones para subsanar el documento interno.
      operationId: subsanarObservacionDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-89247643-3-2021
                plantillaValor:
                  description: Valores del llenado del formulario especificado en el campo `plantilla`.
                  type: object
                  example:   [{
                    "validations": [],
                    "label": "Datos para analizar su caso<br>",
                    "ariaLabel": null,
                    "ariaLabelledBy": null,
                    "customClass": null,
                    "customStyles": null,
                    "disabled": false,
                    "placeholder": null,
                    "autocomplete": null,
                    "readonly": false,
                    "visible": true,
                    "type": "title",
                    "typeInput": "title",
                    "uid": "44946e08-4db6-4f5b-8c9d-631555725243",
                    "name": "title1",
                    "required": false,
                    "active": false,
                    "designColumn": "col-12"
                  }, {}]
                comentario:
                  type: string
                  example: Se ha agregado al área de ASUNTOS JURÍDICOS como destinatario de este documento.
      responses:
        200:
          description: Subsanación registrada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-89247643-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-89247643-3-2021
        "400":
          description: Error al registrar subsanación de observación de documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se ha encontrado el documento con el CITE especificado."
  /gestion/vistoBuenoCreacion:
    post:
      tags:
        - "vistoBuenoCreacion"
      summary: "Dar el visto bueno a la creación de un documento cuando el usuario es vía."
      description: Un usuario marcado como vía de creación de un documento da el visto bueno para que continúe el flujo.
      operationId: vistoBuenoViaCreacion
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-DGCA-3-2021
                comentario:
                  type: string
                  description: Comentario sobre el visto bueno dado.
                  example: (opcional) Se da el visto bueno dle presente informe para que el flujo prosiga.
      responses:
        200:
          description: Visto bueno registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  cite:
                    type: string
                    example: MJTI-DGCA-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-DGCA-2-2021
        "400":
          description: Error al dar el visto bueno de creación de documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró el documento con CITE 'MJTI-DGCA-3-2021'"
  /gestion/vistoBuenoDerivacion:
    post:
      tags:
        - "vistoBuenoDerivacion"
      summary: "Dar el visto bueno a la derivación de un documento cuando el usuario es vía."
      description: Un usuario marcado como vía de derivación de un documento da el visto bueno para que continúe el flujo.
      operationId: vistoBuenoViaDerivacion
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-DGCA-3-2021
                comentario:
                  type: string
                  description: Comentario sobre el visto bueno dado.
                  example: (opcional) Se da el visto bueno dle presente informe para que el flujo prosiga.
      responses:
        200:
          description: Visto bueno registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  cite:
                    type: string
                    example: MJTI-DGCA-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-DGCA-2-2021
        "400":
          description: Error al dar el visto bueno de derivación de documento.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró el documento con CITE 'MJTI-DGCA-3-2021'"

  /gestion/derivarDocumentoInterno:
    post:
      tags:
        - "derivarDocumentoInterno"
      summary: "Derivación de documento interno."
      description: Se hace la derivación de un documento interno.
      operationId: derivarDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              - descripcion
              - destinatario
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-89247643-3-2021
                destinatario:
                  type: string
                  description: Documento de identidad del destinatario para quien se deriva este documento.
                  example: 5212317
                descripcion:
                  type: string
                  description: Detalle textual de la Derivación
                  example: Se deriva este documento a Juan Manuel Marcillas por ser el responsable actual del área de asuntos legales y tiene conocimiento sobre los procesos solicitados.
                via:
                  type: object
                  properties:
                    tipo:
                      type: string
                      enum:
                        - CON COPIA
                        - VISTO BUENO REQUERIDO
                      description: |
                        `CON COPIA`: Significa que el usuario puede ver y hacer observaciones pero no es necesario que dé el visto bueno.
                        `VISTO BUENO REQUERIDO`: Significa que el usuario via debe dar el visto bueno al documento para que el destinatario pueda ver el documento en su bandeja.
                    numeroDocumentos:
                      items:
                        type: array
                        items:
                          type: string
                          example: 12345673
                      description: Números de documentos de identidad para poner a estos usuarios como **vía**.
                documentosAdjuntos:
                  type: array
                  items:
                    type: object
                    properties:
                      nombre:
                        type: string
                        example: Report-22-marzo
                      contenido:
                        type: string
                        example: CadenaBase64........
                        description: Se espera Cadena base 64
                      tipo:
                        type: string
                        enum:
                          - pdf
                          - jpg
                          - jpeg
                          - png
                          - odt
                          - doc
                          - docx
                        description: Tipo de archivo.
      responses:
        200:
          description: Documento derivado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-89247643-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-89247643-3-2021
                  etapaFlujo:
                    type: number
                    example: 2
        "400":
          description: Error al derivar documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró el 'destintarioEspecifico'"

  /gestion/archivarDocumentoInterno:
    post:
      tags:
        - "archivarDocumentoInterno"
      summary: "Archiva un documento interno."
      description: El destinatario archiva un documento interno. Se espera que se apruebe el documento con ciudadanía digital primero.
      operationId: archivarDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-89247643-3-2021
                descripcion:
                  type: string
                  description: Razón para archivar este documento.
                  example: (opcional) Este documento se ha concluído pero por actualizaciones posteriores ya no tiene efecto.
                categoria:
                  type: string
                  description: (opcional) La categoría a la que se quiere archivar este flujo documental incluídos todos los documentos.
                  example: informes
      responses:
        200:
          description: Documento archivado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-89247643-3-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-89247643-3-2021
                  linkRedireccion:
                    type: string
                    example: https://link.....
                    description: Este campo es `null` cuando no se ha hecho el proceso de aprobación con ciudadanía digital.
        "400":
          description: Error al archivar documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró documento con el CITE especificado."
  /gestion/cerrarDocumentoInterno:
    post:
      tags:
        - "cerrarDocumentoInterno"
      summary: "Cierra un documento interno y con este el flujo documental."
      description: El destinatario cierra un documento interno. Esta acción da conclusión también al flujo documental asociado. El destinatario debe aprobar el cierre del documento.
      operationId: cerrarDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - cite
              properties:
                cite:
                  type: string
                  description: CITE del documento.
                  example: MJTI-89247643-3-2021
                descripcion:
                  type: string
                  description: Razón para cerrar este documento.
                  example: (opcional) Se han completado las solicitudes para este documento.
      responses:
        200:
          description: Documento cerrado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  citeDocumento:
                    type: string
                    example: MJTI-LEGAL-11-2021
                  codigoFlujo:
                    type: string
                    example: F-MJTI-89247643-3-2021
                  linkRedireccion:
                    type: string
                    example: https://link.....
                    description: Este campo es `null` cuando no se ha hecho el proceso de aprobación con ciudadanía digital.
        "400":
          description: Error al cerrar documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "No se encontró documento con el CITE especificado."
  /gestion/archivoAdjunto:
    get:
      tags:
        - "archivoAdjunto"
      summary: "Obtiene el contenido de un archivo adjunto en base 64"
      description: Mediante el nombre se busca el archivo adjunto y devuelve el MIME type + el contenido en base 64. Si el documento para el que fue subido es **CLASIFICADO** el contenido solo se devuelve si el usuario es parte del flujo documental, si es **ABIERTO** se devuelve a cualquier usuario.
      parameters:
      - name: nombre
        in: query
        description: Nombre del archivo subido
        required: true
        schema:
          type: string
          example: doc_RSS-pdf_01122021-075028.pdf
      operationId: archivoAdjuntoEnB64
      responses:
        200:
          description: Archivo encontrado y disponible.
          content:
            application/json:
              schema:
                type: object
                properties:
                  datos:
                    type: string
                    example: data:application/pdf;base64,JVBERi0xLj...
        "404":
          description: Error al obtener archivo
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "Archivo no encontrado doc_RSS-pdf_01122021-075028.pd"
  /gestion/historialFlujo:
    get:
