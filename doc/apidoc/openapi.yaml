                    "nombreEntidad": "DORA1",
                    "endpoints": [
                      "usuarios",
                      "documentoInterno",
                      "documentoInternoSearch",
                      "archivoAdjunto",
                      "historialFlujo",
                      "categoriasFlujo"
                    ],
                    "userCreated": "7171272e-b31b-4c34-9220-9f535c958c5c",
