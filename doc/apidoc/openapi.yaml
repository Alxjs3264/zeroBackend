openapi: 3.0.1
info:
  description: "Servicios web para sistema de gestión documental."
  version: "1.0.0"
  title: "GESTIÓN DOCUMENTAL - MJTI"
  contact:
    email: "apiteam@swagger.io"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
tags:
- name: "usuarios"
  description: "Listado reducido de usuarios"
- name: "documentoInterno"
  description: "Inicio del flujo de gestión documental para documentos internos."
- name: "documentoInternoSearch"
  description: "Permite listar documentos internos"
- name: "bandejaDocumentos"
  description: "Bandeja de documentos de cada usuario"
- name: "despacharDocumentoInterno"
  description: Despachar documento interno confirmando su creación
- name: "aceptarDocumentoInterno"
  description: Acepta la revisión de un documento interno.
- name: "observacionDocumentoInterno"
  description: Observación o consulta para un documento interno.
- name: "derivarDocumentoInterno"
  description: Derivación de documento interno
- name: "vistoBuenoCreacion"
  description: Visto bueno cuando un usuario es vía de la ceración de un documento interno.
- name: "vistoBuenoDerivacion"
  description: Visto bueno cuando un usuario es vía de la derivación de un documento interno.
- name: "archivarDocumentoInterno"
  description: Archiva un documento interno.
- name: "cerrarDocumentoInterno"
  description: Cierra un documento interno.
- name: "archivoAdjunto"
  description: Obtiene el contenido un archivo adjunto
- name: "historialFlujo"
  description: Obtiene el historial completo de un flujo documental
- name: "categoriasFlujo"
  description: Obtiene una lista de las categorías de flujos documentales archivados.
- name: "iopToken"
  description: Creación y listado de tokens de interoperabilidad para sistemas externos.

paths:
  /system/usuariosSearch:
    get:
      tags:
        - "usuarios"
      summary: "Obtiene una lista reducida de usuarios en el sistema"
      description: Realiza el listado reducido de usuarios dados los criterios de búsqueda en los parámetros.
      parameters:
      - name: nombre
        in: query
        description: Nombres de la persona
        required: false
        schema:
          type: string
          example: Marcos Quintalla
      - name: area
        in: query
        description: Nombre del área a la que pertenece el usuario 
        required: false
        schema:
          type: string
          example: Asuntos jurídicos
      - name: cargo
        in: query
        description: Cargo del funcionario
        required: false
        schema:
          type: string
          example: jefe de unidad
      - name: estado
        in: query
        description: Estado del usuario
        schema:
          type: string
          enum:
            - ACTIVO
            - INACTIVO
          
      responses:
        200:
          description: Usuarios listados correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/usuarioReducido"

  ###################### Documentos INTERNOS ########################
  /gestion/documentoInterno:
    post:
      tags:
        - "documentoInterno"
      summary: "Crea un nuevo documento interno."
      description: Crea un documento interno para iniciar o continuar el flujo de gestión documental. El campo `citeDocumentoPadre` es para especificar que este documento es la continuación, el documento nuevo pertenecerá al **mismo flujo documental**. Para iniciar un nuevo flujo **no se debe enviar** este campo. A menos que se envíe el campo **guardar** como `true` el documento no tendrá CITE y se guarda como borrador hasta que se aplique la acción despachar documento. Si se envía el campo `guardar=true` se genera inmediatamente el cite del documento y se inicia el proceso de aprobación por ciudadanía digital y luego de que el usuario apruebe el documento se devolverá también un `linkRedireccion`.
 
      operationId: crearDocumentoInterno
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
              - nombrePlantilla
              - plantilla
              - plantillaValor
              - clasificacion
              properties:
                nombrePlantilla:
                  type: string
                  example: Solicitud de viáticos de viaje
                abreviación:
                  type: string
                  example: SOLICITUD-VIÁTICOS-VIAJE
                asunto:
                  type: string
                  example: Solicitud de viajes Carlos Perez.
                plantilla:
                  description: La estructura de la plantilla, este es un array resultado de la creación de una plantilla usando el **módulo de creación de formularios de la BPM**.
                  type: object
                  example:   [{
                    "validations": [],
                    "label": "Datos para analizar su caso<br>",
                    "ariaLabel": null,
                    "ariaLabelledBy": null,
                    "customClass": null,
                    "customStyles": null,
                    "disabled": false,
                    "placeholder": null,
                    "autocomplete": null,
                    "readonly": false,
                    "visible": true,
                    "type": "title",
                    "typeInput": "title",
                    "uid": "44946e08-4db6-4f5b-8c9d-631555725243",
                    "name": "title1",
                    "required": false,
                    "active": false,
                    "designColumn": "col-12"
                  }, {}]
                plantillaValor:
                  description: Valores del llenado del formulario especificado en el campo `plantilla`.
                  type: object
                  example:   [{
                    "validations": [],
                    "label": "Datos para analizar su caso<br>",
                    "ariaLabel": null,
                    "ariaLabelledBy": null,
                    "customClass": null,
                    "customStyles": null,
                    "disabled": false,
                    "placeholder": null,
                    "autocomplete": null,
                    "readonly": false,
                    "visible": true,
                    "type": "title",
                    "typeInput": "title",
                    "uid": "44946e08-4db6-4f5b-8c9d-631555725243",
                    "name": "title1",
                    "required": false,
                    "active": false,
                    "designColumn": "col-12"
                  }, {}]
                clasificacion:
                  type: string
                  enum:
                    - ABIERTO
                    - CLASIFICADO
                    - SOLO PARA REFERENCIAR
                  description: |
                    `CLASIFICADO` Solo el remitente, destinatario y vias pueden verlo.
                    `ABIERTO` Todos los usuarios pueden verlos.
                    `SOLO PARA REFERENCIAR` Estos documentos se pueden referenciar por cualquier otro documento sin necesidad de aprobación pero no pertenecen a ningún flujo documental por tanto no se pueden derivar.
                destinatarioEspecifico:
                  type: string
                  description: Documento de identidad del destinatario para quien se entrega este documento. Se usa este campo cuando el destinatario es una persona en particular.
                  example: 5212317 (opcional)
                destinatarioArea:
                  type: string
                  description: Nombre del área de la institución a la que se entrega este documento. Todos los usuarios pertenecientes a esa área especifica lo podrán revisar en su bandeja.
                  example: ASUNTOS JURÍDICOS (opcional)
                citeDocumentoPadre:
                  type: string
                  description: CITE del documento padre de este documento, **si este campo se proporciona** se entiende que el documento siendo creado es una continuación del documento padre. Ambos documentos pertenecerán al mismo flujo documental.
                  example: 182-2021/LEGAL (opcional)
                via:
                  type: object
                  properties:
                    tipo:
                      type: string
                      enum:
                        - CON COPIA
                        - VISTO BUENO REQUERIDO
                      description: |
                        `CON COPIA`: Significa que el usuario puede ver y hacer observaciones pero no es necesario que dé el visto bueno.
                        `VISTO BUENO REQUERIDO`: Significa que el usuario via debe dar el visto bueno al documento para que el destinatario pueda ver el documento en su bandeja.
                    numeroDocumentos:
                      items:
                        type: array
                        items:
                          type: string
                          example: 12345673
                      description: Números de documentos de identidad para poner a estos usuarios como **vía**.
                documentosAdjuntos:
                  type: array
                  items:
                    type: object
                    properties:
                      nombre:
                        type: string
                        example: Report-22-marzo
                      contenido:
                        type: string
                        example: CadenaBase64........
                        description: Se espera Cadena base 64
                      tipo:
                        type: string
                        enum:
                          - pdf
                          - jpg
                          - jpeg
                          - png
                          - odt
                          - doc
                          - docx
                        description: Tipo de archivo.
                referencias:
                  type: array
                  items:
                    type: string
                    example: "MJTI-DGCA-23-2021"
                  description: CITE de los documentos que se usa como referencias. Solo se puede usar documentos en estado `CERRADO` como referencias.
                guardar:
                  type: boolean
                  example: false
                  description: Hace que se guarde este documento y se genere un CITE. Si no se envía o es `false` el documento solo tendrá un correlativo y se generará un CITE cuando se despache. Mnadar como `true` hace que se inicie el proceso de aprobación por ciudadanía digital del documento.

      responses:
        200:
          description: Documento creado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  correlativo:
                    type: string
                    example: MJTI-RRHH-12-2021
                  cite:
                    type: string
                    example: MJTI-ATIC-1-2021
                  codigoFlujo:
                    type: string
                    example: F-182-2021/LEGAL
                  linkRedireccion:
                    type: string
                    example: https://demo.gtic.gob.bo/ciudadania-firma/29941-92914919291912
                    description: Este campo es `null` cuando no se ha hecho el proceso de aprobación.
        "400":
          description: Error al documento
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                    example: Error documento
                  errores:
                    type: array
                    items:
                      type: string
                      example: "'plantillaValor' es un campo obligatorio"
    put:
      tags:
