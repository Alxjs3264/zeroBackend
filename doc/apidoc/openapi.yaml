  /system/iopToken:
    get:
      tags:
        - "iopToken"
      summary: Categorías de flujos documentales archivados. Solo para el usuario **ADMIN**.
      description: Obtiene la lista de sistemas/entidades y los tokens registrados para acceder a la determinados endpoints de recuperación de datos.
      operationId: iopTokenCrear
      responses:
        200:
          description: Tokens Iop listados correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: 272626fa-13cb-436c-bd50-9210ce978bb0
                    idUsuario:
                      type: string
                      example: f2820d24-61aa-42a7-8da0-b21e2f9dfef8
                    nombreEntidad:
                      type: string
                      example: DORI
                    token:
                      type: string
                      example: 28c39810....
                    endpoints:
                      type: array
                      items:
                        type: string
                        example:
                          - usuarios
                          - historialFlujo
                      description: |
                        Endpoints a los que se tiene acceso. Solo están disponibles los endpoints:
                        - usuarios
                        - documentoInterno
                        - documentoInternoSearch
                        - archivoAdjunto
                        - historialFlujo
                        - categoriasFlujo
                    activo:
                      type: boolean
                      example: true
    post:
      tags:
        - "iopToken"
      summary: Categorías de flujos documentales archivados. Solo para el usuario **ADMIN**.
      description: Registra el nombre de una entidad para poder acceder a ciertos endpoints
      operationId: iopTokenListar
      requestBody:
        description: Entrada de datos.
        content:
          application/json:
            schema:
              required:
                - nombreEntidad
                - endpoints
              properties:
                usuario:
                  type: string
                  example: 1000001
                  description: Número de documento de identidad del usuario que se asocia con esta entidad.
                nombreEntidad:
                  type: string
                  example: DORIA
                endpoints:
                  type: array
                  example:
                    - usuarios
                    - documentoInterno
                    - documentoInternoSearch
                    - archivoAdjunto
                    - historialFlujo
                    - categoriasFlujo
                  description: |
                    Se registran los endpoints a los que se tendrá acceso. Solo se permiten los endpoints:
                    - usuarios
                    - documentoInterno
                    - documentoInternoSearch
                    - archivoAdjunto
                    - historialFlujo
                activo:
                  type: boolean
                  example: true
      responses:
        200:
          description: Tokens Iop listados correctamente.
          content:
            application/json:
              schema:
                type: object
                example: {
                  "mensaje": "OK",
                  "finalizado": true,
                  "datos": {
